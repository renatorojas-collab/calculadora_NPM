<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Riesgo</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f4f7fb;
}

.container {
  max-width: 520px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.label {
  margin-top: 15px;
  font-size: 14px;
  font-weight: bold;
}

.subtext {
  font-size: 12px;
  color: #666;
  margin-top: 3px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* Quitar flechas */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

/* TOGGLES */
.toggle-group {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.toggle-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #f8f9fb;
  cursor: pointer;
  text-align: center;
}

/* Verde agua */
.toggle-btn.active {
  background: #20c997;
  color: white;
  border-color: #20c997;
}

/* BOTONES */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: #0066ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* RESULTADO CLÍNICO */
.result-card {
  margin-top: 25px;
  padding: 25px;
  border-radius: 12px;
  background: #1f7a63;
  color: white;
}

.result-value {
  font-size: 36px;
  font-weight: bold;
}

.result-title {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

/* FORMULA */
.formula-btn {
  background: #f1f3f6;
  color: #333;
}

.formula-box {
  display: none;
  margin-top: 15px;
  padding: 15px;
  background: #fafafa;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 13px;
  line-height: 1.5;
}

</style>
</head>

<body>

<div class="container">

<h2>Riesgo de Malignidad</h2>

<label class="label">Edad (años)</label>
<input type="number" id="edad" min="0">

<label class="label">Tamaño (mm)</label>
<div class="subtext">Rango permitido: 12 – 120 mm</div>
<input type="number" id="tamano" min="12" max="120">

<label class="label">Densidad</label>
<div class="toggle-group" id="densidad">
  <div class="toggle-btn" onclick="selectToggle('densidad', this, 1)">Parcialmente sólido</div>
  <div class="toggle-btn" onclick="selectToggle('densidad', this, 2)">Sólido</div>
</div>

<label class="label">Historial respiratorio</label>
<div class="toggle-group" id="resp">
  <div class="toggle-btn" onclick="selectToggle('resp', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('resp', this, 1)">Sí</div>
</div>

<label class="label">Historial oncológico</label>
<div class="toggle-group" id="onc">
  <div class="toggle-btn" onclick="selectToggle('onc', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('onc', this, 1)">Sí</div>
</div>

<label class="label">Crecimiento tumoral</label>
<div class="toggle-group" id="crec">
  <div class="toggle-btn" onclick="selectToggle('crec', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('crec', this, 1)">Sí</div>
</div>

<button onclick="calcular()">Calcular</button>

<!-- RESULTADO -->
<div id="resultado" class="result-card" style="display:none;">
  <div class="result-value" id="valor"></div>
  <div class="result-title">Probabilidad de malignidad</div>
</div>

<button class="formula-btn" onclick="toggleFormula()">Ver fórmula</button>

<div id="formulaBox" class="formula-box">
  <b>FÓRMULA</b><br><br>
  Probabilidad = 100 × e<sup>X</sup> / (1 + e<sup>X</sup>)<br><br>
  <b>Donde:</b><br>
  X = (0.0943×edad) − (0.0501×tamaño) + (0.3395×densidad) − (1.9429×resp) − (0.0898×onc) + (4.6207×crec) − 5.1058
</div>

</div>

<script>

let valores = {
  densidad: null,
  resp: null,
  onc: null,
  crec: null
};

function selectToggle(grupo, elemento, valor) {
  let botones = document.getElementById(grupo).children;
  for (let btn of botones) btn.classList.remove("active");
  elemento.classList.add("active");
  valores[grupo] = valor;
}

function calcular() {

  let edad = parseFloat(document.getElementById("edad").value);
  let tamano = parseFloat(document.getElementById("tamano").value);

  if (isNaN(edad) || isNaN(tamano) ||
      valores.densidad === null || valores.resp === null ||
      valores.onc === null || valores.crec === null) {
    alert("Completa todos los campos");
    return;
  }

  if (edad < 0) {
    alert("Edad debe ser ≥ 0");
    return;
  }

  if (tamano < 12 || tamano > 120) {
    alert("Tamaño entre 12 y 120 mm");
    return;
  }

  let X = (0.0943 * edad
         - 0.0501 * tamano
         + 0.3395 * valores.densidad
         - 1.9429 * valores.resp
         - 0.0898 * valores.onc
         + 4.6207 * valores.crec
         - 5.1058);

  let P = Math.exp(X) / (1 + Math.exp(X));
  let porcentaje = (P * 100).toFixed(2);

  document.getElementById("resultado").style.display = "block";
  document.getElementById("valor").innerHTML = porcentaje + " %";
}

function toggleFormula() {
  let box = document.getElementById("formulaBox");
  box.style.display = (box.style.display === "block") ? "none" : "block";
}

</script>

</body>
</html>
