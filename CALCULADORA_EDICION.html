<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Riesgo de malignidad</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 520px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.label { margin-top: 15px; font-weight: bold; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
}

.toggle-group { display: flex; gap: 10px; margin-top: 5px; }

.toggle-btn {
  flex: 1;
  padding: 12px;
  background: #eee;
  text-align: center;
  cursor: pointer;
}

.toggle-btn.active {
  background: #20c997;
  color: white;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  background: #0066ff;
  color: white;
  border: none;
}

.result-card {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>Riesgo de malignidad</h2>

<label class="label">Edad</label>
<input type="number" id="edad">

<label class="label">Tamaño (mm)</label>
<input type="number" id="tamano">

<label class="label">Densidad</label>
<div class="toggle-group" id="densidad">
  <div class="toggle-btn" onclick="selectToggle('densidad', this, 1)">Parcial</div>
  <div class="toggle-btn" onclick="selectToggle('densidad', this, 2)">Sólido</div>
</div>

<label class="label">Respiratorio</label>
<div class="toggle-group" id="resp">
  <div class="toggle-btn" onclick="selectToggle('resp', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('resp', this, 1)">Sí</div>
</div>

<label class="label">Oncológico</label>
<div class="toggle-group" id="onc">
  <div class="toggle-btn" onclick="selectToggle('onc', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('onc', this, 1)">Sí</div>
</div>

<label class="label">Crecimiento</label>
<div class="toggle-group" id="crec">
  <div class="toggle-btn" onclick="selectToggle('crec', this, 0)">No</div>
  <div class="toggle-btn" onclick="selectToggle('crec', this, 1)">Sí</div>
</div>

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="result-card" style="display:none;">
  <div id="valor"></div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbz2dqXDDqrYA6KLBPblfBkyzi4Z1Jy0-8Qj-Kls6tWWAx8bYTUbjfVKihn7aB98QCk/exec"; 

let valores = {
  densidad: null,
  resp: null,
  onc: null,
  crec: null
};

function selectToggle(grupo, el, valor) {
  let botones = document.getElementById(grupo).children;
  for (let b of botones) b.classList.remove("active");
  el.classList.add("active");
  valores[grupo] = valor;
}

function calcular() {

  let edad = parseFloat(document.getElementById("edad").value);
  let tamano = parseFloat(document.getElementById("tamano").value);

  if (isNaN(edad) || isNaN(tamano) ||
      valores.densidad === null ||
      valores.resp === null ||
      valores.onc === null ||
      valores.crec === null) {
    alert("Completa todo");
    return;
  }

  let X = (0.0943 * edad
          - 0.0501 * tamano
          + 0.3395 * valores.densidad
          - 1.9429 * valores.resp
          - 0.0898 * valores.onc
          + 4.6207 * valores.crec
          - 5.1058);

  let P = Math.exp(X) / (1 + Math.exp(X));
  let porcentaje = (P * 100).toFixed(1);

  document.getElementById("resultado").style.display = "block";
  document.getElementById("valor").innerHTML = porcentaje + " %";

  // 🔥 GUARDAR EN GOOGLE SHEETS
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      edad: edad,
      tamano: tamano,
      densidad: valores.densidad,
      resp: valores.resp,
      onc: valores.onc,
      crec: valores.crec,
      resultado: porcentaje
    })
  })
  .then(res => res.json())
  .then(data => console.log("Guardado OK"))
  .catch(err => console.error("Error", err));
}

</script>

</body>
</html>
